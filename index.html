<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Prep Portal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="bg-animation">
        <div class="blob"></div>
        <div class="blob"></div>
        <div class="blob"></div>
    </div>

    <section id="auth-section" class="container">
        <div class="glass-card auth-box">
            <div class="brand-logo"><i class="fas fa-graduation-cap"></i></div>
            <h1>Student Portal</h1>
            <div class="input-group">
                <div class="field"><i class="fas fa-user"></i><input type="text" id="username" placeholder="Email or Username"></div>
                <div class="field"><i class="fas fa-lock"></i><input type="password" id="password" placeholder="Password"></div>
            </div>
            <button onclick="handleAuth()" class="btn-glow">Login / Register <i class="fas fa-arrow-right"></i></button>
        </div>
    </section>

    <section id="dashboard-section" class="container hidden">
        <nav class="top-nav">
            <div class="user-info">
                <div class="avatar"><i class="fas fa-user-graduate"></i></div>
                <h2 id="welcome-msg">Welcome, User</h2>
            </div>
            <div class="actions">
                <button onclick="logout()" class="icon-btn logout" title="Logout"><i class="fas fa-power-off"></i></button>
            </div>
        </nav>

        <div class="main-title"><h1>Select a Subject</h1></div>

        <div class="subject-grid">
            <div class="subject-card" onclick="startQuiz('DBMS')">
                <div class="card-icon"><i class="fas fa-database"></i></div>
                <h3>DBMS</h3>
            </div>
            <div class="subject-card" onclick="startQuiz('OS')">
                <div class="card-icon"><i class="fas fa-microchip"></i></div>
                <h3>OS</h3>
            </div>
            <div class="subject-card" onclick="startQuiz('CN')">
                <div class="card-icon"><i class="fas fa-network-wired"></i></div>
                <h3>Network</h3>
            </div>
            <div class="subject-card" onclick="startQuiz('DSA')">
                <div class="card-icon"><i class="fas fa-code"></i></div>
                <h3>DSA</h3>
            </div>
            <div class="subject-card" onclick="startQuiz('AI')">
                <div class="card-icon"><i class="fas fa-brain"></i></div>
                <h3>AI</h3>
            </div>
        </div>

        <div class="dashboard-results glass-card">
            <div class="res-header">
                <h3><i class="fas fa-history"></i> Recent Performance</h3>
                <span class="badge" id="total-attempts">0 Attempts</span>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Subject</th>
                            <th>Score</th>
                            <th>Status</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody id="dashboard-res-body">
                    </tbody>
                </table>
            </div>
        </div>
    </section>

    <section id="quiz-section" class="container hidden">
        <div class="quiz-container glass-card">
            <div class="quiz-top">
                <h2 id="current-subject">Subject</h2>
                <div id="question-counter" class="badge">1/5</div>
            </div>
            <div class="progress-wrapper"><div id="progress" class="progress-fill"></div></div>
            <h3 id="question-text">Question loading...</h3>
            <div id="options-container" class="options-list"></div>
        </div>
    </section>

    <section id="result-section" class="container hidden">
        <div class="glass-card result-card">
            <div id="result-emoji" class="emoji">🎉</div>
            <h1 id="result-status">Passed!</h1>
            <div class="score-circle"><span id="result-score">0/5</span></div>

            <div class="review-section">
                <h3>Detailed Answer Review</h3>
                <div class="table-container">
                    <table id="review-table">
                        <thead>
                            <tr>
                                <th>Question</th>
                                <th>Your Choice</th>
                                <th>Correct Answer</th>
                            </tr>
                        </thead>
                        <tbody id="review-body"></tbody>
                    </table>
                </div>
            </div>

            <button onclick="showDashboard()" class="btn-glow">Back to Dashboard</button>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
